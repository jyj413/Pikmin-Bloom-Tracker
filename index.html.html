<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decor Pikmin Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');
  :root {
    --bg:#0e1a12;--surface:#162019;--surface2:#1e2e22;--border:#2a3d2e;
    --green:#5ecf6e;--green-dim:#2d6637;--text:#d4e8d6;--text-dim:#7a9a7e;
    --red-col:#e85555;--ice-col:#88ddff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;min-height:100vh;}

  header{background:linear-gradient(135deg,#162019,#0e1a12);border-bottom:1px solid var(--border);padding:16px 16px 12px;position:sticky;top:0;z-index:10;}
  header h1{font-size:22px;font-weight:900;color:var(--green);letter-spacing:-.5px;}
  header p{color:var(--text-dim);font-size:12px;margin-top:2px;}
  .prog-wrap{margin-top:10px;background:var(--border);border-radius:6px;height:8px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--green-dim),var(--green));border-radius:6px;transition:width .3s;}
  .prog-label{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text-dim);}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim);}
  .legdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .filter-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .fbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:16px;padding:4px 10px;font-family:'Nunito',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;}
  .fbtn.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}

  /* Search + Sort row */
  .search-sort-row{display:flex;gap:6px;margin-top:8px;align-items:center;}
  .search-wrap{flex:1;position:relative;}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;padding:5px 10px 5px 28px;outline:none;transition:border-color .15s;}
  .search-wrap input:focus{border-color:var(--green);}
  .search-wrap .sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:.5;}
  .sort-select{background:var(--surface2);border:1px solid var(--border);border-radius:16px;color:var(--text-dim);font-family:'Nunito',sans-serif;font-size:11px;padding:4px 8px;outline:none;cursor:pointer;}
  .sort-select:focus{border-color:var(--green);}

  .reset-btn{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:4px 10px;font-family:'Nunito',sans-serif;font-size:11px;cursor:pointer;}
  .reset-btn:hover{border-color:var(--red-col);color:var(--red-col);}

  .sec-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:14px 16px 6px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin:0 10px 8px;overflow:hidden;}
  .card.all-done{border-color:var(--green-dim);opacity:.75;}
  .card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;user-select:none;}
  .card-left{display:flex;align-items:center;gap:8px;min-width:0;}
  .loc-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
  .card-name{font-weight:700;font-size:14px;}
  .card-sub{font-size:11px;color:var(--text-dim);margin-top:1px;}
  .card-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .badge{background:var(--surface2);border-radius:10px;padding:2px 7px;font-size:11px;color:var(--text-dim);font-weight:700;white-space:nowrap;}
  .badge.full{background:var(--green-dim);color:var(--green);}
  .badge.rare{background:#2a1a00;color:#ffd700;}
  .chevron{color:var(--text-dim);font-size:12px;transition:transform .2s;}
  .card.open .chevron{transform:rotate(180deg);}
  .ibtn{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px;line-height:1;transition:color .15s;}
  .ibtn:hover{color:var(--text);}
  .ibtn.del:hover{color:var(--red-col);}

  .card-body{display:none;border-top:1px solid var(--border);}
  .card.open .card-body{display:block;}
  .sub-row{border-bottom:1px solid var(--border);}
  .sub-row:last-child{border-bottom:none;}
  .sub-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 3px;}
  .sub-name{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);}
  .tag-row{display:flex;flex-wrap:wrap;gap:5px;padding:2px 12px 8px;}

  /* Pikmin tags */
  .pik-tag{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 10px 5px 8px;cursor:pointer;font-size:12px;font-weight:700;border:1.5px solid transparent;user-select:none;transition:all .15s;}
  .pik-tag[data-state="none"]    {background:var(--surface2);border-color:var(--border);color:var(--text-dim);opacity:.5;}
  .pik-tag[data-state="progress"]{background:#0a1f3a;border-color:#4488dd;color:#88bbff;}
  .pik-tag[data-state="complete"]{background:#0e2615;border-color:var(--green);color:var(--green);}
  .pik-tag[data-state="rare"]    {background:#2a1a00;border-color:#ffd700;color:#ffd700;}
  .pik-tag[data-state="replace"] {background:#2a0a0a;border-color:#ff6666;color:#ff8888;}
  .pik-tag .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .pik-tag[data-state="none"] .dot    {background:var(--text-dim);opacity:.4;}
  .pik-tag[data-state="progress"] .dot{background:#88bbff;}
  .pik-tag[data-state="complete"] .dot{background:var(--green);}
  .pik-tag[data-state="rare"] .dot    {background:#ffd700;}
  .pik-tag[data-state="replace"] .dot {background:#ff8888;}
  .sicon{font-size:10px;margin-left:2px;}
  .card-note{font-size:10px;color:var(--text-dim);padding:6px 12px 10px;font-style:italic;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-width:500px;padding:20px 16px 36px;max-height:88vh;overflow-y:auto;}
  .modal h2{font-size:16px;font-weight:900;color:var(--green);margin-bottom:4px;}
  .modal-section{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin:16px 0 8px;}
  .mrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .mrow input[type="text"]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:6px 10px;outline:none;}
  .mrow input[type="text"]:focus{border-color:var(--green);}
  .mini-label{font-size:11px;color:var(--text-dim);white-space:nowrap;}
  .tsw{position:relative;width:36px;height:20px;flex-shrink:0;}
  .tsw input{opacity:0;width:0;height:0;position:absolute;}
  .ttrack{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:background .2s;}
  .ttrack::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-dim);transition:transform .2s,background .2s;}
  .tsw input:checked + .ttrack{background:#1a4060;}
  .tsw input:checked + .ttrack::after{transform:translateX(16px);background:var(--ice-col);}
  .tsw.green input:checked + .ttrack{background:var(--green-dim);}
  .tsw.green input:checked + .ttrack::after{background:var(--green);}
  .tsw.gold input:checked + .ttrack{background:#3a2a00;}
  .tsw.gold input:checked + .ttrack::after{background:#ffd700;}

  .sub-edit-row{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;}
  .sub-edit-row input[type="text"]{flex:1;background:transparent;border:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:0;outline:none;min-width:0;}
  .sub-edit-row .sep{color:var(--border);font-size:16px;}
  .add-sub-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--text-dim);font-family:'Nunito',sans-serif;font-size:12px;padding:7px;cursor:pointer;transition:all .15s;margin-top:4px;}
  .add-sub-btn:hover{border-color:var(--green);color:var(--green);}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .btn-save{flex:1;background:var(--green-dim);border:none;border-radius:8px;color:var(--green);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;padding:9px;cursor:pointer;}
  .btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;padding:9px;cursor:pointer;}

  /* Segment picker (section selector in add form) */
  .seg-pick{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:4px;}
  .seg-pick label{flex:1;text-align:center;padding:6px 4px;font-size:11px;font-weight:700;color:var(--text-dim);cursor:pointer;background:var(--surface2);border-right:1px solid var(--border);transition:all .15s;}
  .seg-pick label:last-child{border-right:none;}
  .seg-pick input{display:none;}
  .seg-pick input:checked + span{color:var(--green);}
  .seg-pick label:has(input:checked){background:var(--green-dim);color:var(--green);}

  /* Add section */
  .add-section{margin:0 10px 16px;background:var(--surface);border:1px dashed var(--border);border-radius:10px;overflow:hidden;}
  .add-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;font-weight:700;font-size:13px;color:var(--text-dim);}
  .add-toggle:hover{color:var(--text);}
  .add-form{display:none;padding:4px 12px 14px;}
  .add-form.open{display:block;}
  .add-form label.field-label{display:block;font-size:11px;color:var(--text-dim);margin:10px 0 4px;}
  .add-form input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;padding:7px 10px;outline:none;}
  .add-submit{margin-top:12px;width:100%;background:var(--green-dim);border:none;border-radius:8px;color:var(--green);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;padding:9px;cursor:pointer;}
</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><h1>🌱 Decor Pikmin Tracker</h1><p>Tap a tag to cycle its status</p></div>
    <button class="reset-btn" onclick="resetAll()">Reset All</button>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  <div class="prog-label"><span id="pText">0 tracked</span><span id="pPct">0%</span></div>
  <div class="legend">
    <div class="leg"><div class="legdot" style="background:#555;border:1px solid #888"></div>None</div>
    <div class="leg"><div class="legdot" style="background:#88bbff"></div>🔵 In Progress</div>
    <div class="leg"><div class="legdot" style="background:#5ecf6e"></div>✅ Complete</div>
    <div class="leg"><div class="legdot" style="background:#ffd700"></div>⭐ Rare Complete</div>
    <div class="leg"><div class="legdot" style="background:#ff8888"></div>🔁 Replace</div>
  </div>
  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('missing',this)">Missing</button>
    <button class="fbtn" onclick="setFilter('progress',this)">In Progress</button>
    <button class="fbtn" onclick="setFilter('complete',this)">Complete</button>
    <button class="fbtn" onclick="setFilter('replace',this)">Replace</button>
  </div>
  <div class="search-sort-row">
    <div class="search-wrap">
      <span class="sico">🔍</span>
      <input type="text" id="searchInput" placeholder="Search collections…" oninput="renderAll()">
    </div>
    <select class="sort-select" id="sortSelect" onchange="renderAll()">
      <option value="game">Game Order</option>
      <option value="alpha">A → Z</option>
      <option value="created">Date Created</option>
    </select>
  </div>
</header>
<div id="app"></div>
<div id="mroot"></div>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const STATES=['none','progress','complete','rare','replace'];
const SICON={none:'',progress:'🔵',complete:'✅',rare:'⭐',replace:'🔁'};
const MOST=['red','yellow','blue','purple','white','rock','winged'];
const ALL=[...MOST,'ice'];
const RYB=['red','yellow','blue'];
const PIK={red:'Red',yellow:'Yellow',blue:'Blue',purple:'Purple',white:'White',rock:'Rock',winged:'Winged',ice:'Ice'};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function mkSub(key,label,{ice=false,hasRare=false,rareIce=false}={}){return{key,label,ice,hasRare,rareIce};}

// ─── Built-in base types per location ─────────────────────────────────────────
const BASE_TYPES={
  restaurant:MOST,cafe:MOST,sweetshop:MOST,movie:MOST,pharmacy:MOST,zoo:MOST,
  forest:MOST,waterside:MOST,postoffice:MOST,artgallery:MOST,airport:MOST,
  station:MOST,beach:MOST,burgerplace:MOST,cornerstore:MOST,supermarket:MOST,
  bakery:MOST,hairsalon:MOST,clothes:MOST,park:MOST,library:MOST,sushi:MOST,
  mountain:MOST,stadium:MOST,themepark:RYB,busstop:MOST,italian:MOST,ramen:MOST,
  bridge:MOST,hotel:MOST,makeup:MOST,appliances:['yellow'],curry:MOST,diy:MOST,
  university:RYB,mexican:MOST,laundry:MOST,korean:MOST,stationery:MOST,
  roadside:MOST,rainy:MOST,snowy:MOST,fortune:MOST,
};

// ─── Default sub-collections ──────────────────────────────────────────────────
const DEFAULT_SUBS={
  restaurant:[mkSub('chef','Chef Hat',{ice:true})],
  cafe:      [mkSub('cup','Coffee Cup',{ice:true})],
  sweetshop: [mkSub('macaron','Macaron'),mkSub('donut','Donut')],
  movie:     [mkSub('popcorn','Popcorn'),mkSub('3d','3D Glasses')],
  pharmacy:  [mkSub('tooth','Toothbrush')],
  zoo:       [mkSub('dandl','Dandelion')],
  forest:    [mkSub('beetle','Stag Beetle',{ice:true}),mkSub('acorn','Acorn',{ice:true})],
  waterside: [mkSub('lure','Fishing Lure')],
  postoffice:[mkSub('stamp','Stamp')],
  artgallery:[mkSub('frame','Picture Frame')],
  airport:   [mkSub('plane','Toy Airplane')],
  station:   [mkSub('train','Paper Train'),mkSub('ticket','Ticket')],
  beach:     [mkSub('shell','Shell')],
  burgerplace:[mkSub('burger','Burger')],
  cornerstore:[mkSub('cap','Bottle Cap'),mkSub('snack','Snack')],
  supermarket:[mkSub('mush','Mushroom'),mkSub('banana','Banana')],
  bakery:    [mkSub('baguette','Baguette')],
  hairsalon: [mkSub('scissors','Scissors')],
  clothes:   [mkSub('hairtie','Hair Tie')],
  park:      [mkSub('clover','Clover',{ice:true}),mkSub('fourleaf','Four-Leaf Clover',{ice:true})],
  library:   [mkSub('book','Tiny Book')],
  sushi:     [mkSub('sushi','Sushi')],
  mountain:  [mkSub('pin','Mountain Pin Badge')],
  stadium:   [mkSub('ball','Ball Keychain')],
  themepark: [mkSub('tpticket','Theme Park Ticket')],
  busstop:   [mkSub('bus','Bus Papercraft')],
  italian:   [mkSub('pizza','Pizza'),mkSub('pasta','Pasta')],
  ramen:     [mkSub('ramen','Ramen Keychain')],
  bridge:    [mkSub('bridgepin','Bridge Pin Badge')],
  hotel:     [mkSub('hotel','Hotel Amenities')],
  makeup:    [mkSub('makeup','Makeup')],
  appliances:[mkSub('battery','Battery'),mkSub('lights','Fairy Lights')],
  curry:     [mkSub('curry','Curry Bowl')],
  diy:       [mkSub('tool','Tool')],
  university:[mkSub('crest','College Crest Patch')],
  mexican:   [mkSub('taco','Taco')],
  laundry:   [mkSub('laundry','Laundry Item')],
  korean:    [mkSub('kimchi','Kimchi',{ice:true})],
  stationery:[mkSub('stat','Stationery',{ice:true})],
  roadside:  [mkSub('greensticker','Green Sticker'),mkSub('bluesticker','Blue Sticker'),mkSub('yellowsticker','Yellow Sticker'),mkSub('coin','Coin',{hasRare:true})],
  rainy:     [mkSub('umbrella','Umbrella',{ice:true}),mkSub('raincoat','Raincoat',{ice:true})],
  snowy:     [mkSub('scarf','Scarf',{ice:true}),mkSub('earmuffs','Earmuffs',{ice:true})],
  fortune:   [mkSub('omikuji','Omikuji')],
};

// ─── Location list (game order; roadside after library) ───────────────────────
// createdAt = 0 means built-in (sort by index for "game order")
const LOCS=[
  {id:'restaurant',icon:'🍽️',name:'Restaurant',          section:'location'},
  {id:'cafe',      icon:'☕', name:'Café',                section:'location'},
  {id:'sweetshop', icon:'🍩',name:'Sweetshop',            section:'location'},
  {id:'movie',     icon:'🎬',name:'Movie Theater',        section:'location'},
  {id:'pharmacy',  icon:'💊',name:'Pharmacy',             section:'location'},
  {id:'zoo',       icon:'🦁',name:'Zoo',                  section:'location'},
  {id:'forest',    icon:'🌲',name:'Forest',               section:'location'},
  {id:'waterside', icon:'🌊',name:'Waterside',            section:'location'},
  {id:'postoffice',icon:'📮',name:'Post Office',          section:'location'},
  {id:'artgallery',icon:'🖼️',name:'Art Gallery',         section:'location'},
  {id:'airport',   icon:'✈️',name:'Airport',              section:'location'},
  {id:'station',   icon:'🚉',name:'Station',              section:'location'},
  {id:'beach',     icon:'🏖️',name:'Beach',               section:'location'},
  {id:'burgerplace',icon:'🍔',name:'Burger Place',        section:'location'},
  {id:'cornerstore',icon:'🏪',name:'Corner Store',        section:'location'},
  {id:'supermarket',icon:'🛒',name:'Supermarket',         section:'location'},
  {id:'bakery',    icon:'🥖',name:'Bakery',               section:'location'},
  {id:'hairsalon', icon:'✂️',name:'Hair Salon',           section:'location'},
  {id:'clothes',   icon:'👗',name:'Clothes Store',        section:'location'},
  {id:'park',      icon:'🍀',name:'Park',                 section:'location'},
  {id:'library',   icon:'📚',name:'Library & Bookstore',  section:'location'},
  {id:'roadside',  icon:'🛤️',name:'Roadside',            section:'special'},
  {id:'sushi',     icon:'🍣',name:'Sushi Restaurant',     section:'location'},
  {id:'mountain',  icon:'⛰️',name:'Mountain',            section:'location'},
  {id:'stadium',   icon:'🏟️',name:'Stadium',             section:'location'},
  {id:'themepark', icon:'🎡',name:'Theme Park',           section:'location'},
  {id:'busstop',   icon:'🚌',name:'Bus Stop',             section:'location'},
  {id:'italian',   icon:'🍕',name:'Italian Restaurant',   section:'location'},
  {id:'ramen',     icon:'🍜',name:'Ramen Restaurant',     section:'location'},
  {id:'bridge',    icon:'🌉',name:'Bridge',               section:'location'},
  {id:'hotel',     icon:'🏨',name:'Hotel',                section:'location'},
  {id:'makeup',    icon:'💄',name:'Makeup Store',         section:'location'},
  {id:'appliances',icon:'🔌',name:'Appliances Store',     section:'location'},
  {id:'curry',     icon:'🍛',name:'Curry Restaurant',     section:'location'},
  {id:'diy',       icon:'🔨',name:'DIY Store',            section:'location'},
  {id:'university',icon:'🎓',name:'University & College', section:'location'},
  {id:'mexican',   icon:'🌮',name:'Mexican Restaurant',   section:'location'},
  {id:'laundry',   icon:'🧺',name:'Laundromat',           section:'location'},
  {id:'korean',    icon:'🥢',name:'Korean Restaurant',    section:'location'},
  {id:'stationery',icon:'✏️',name:'Stationery Store',    section:'location'},
  {id:'rainy',     icon:'🌧️',name:'Rainy Day',           section:'special'},
  {id:'snowy',     icon:'❄️', name:'Snowy Day',           section:'special'},
  {id:'fortune',   icon:'🎋',name:'Shrines & Temples',    section:'special'},
];

// ─── Storage ──────────────────────────────────────────────────────────────────
let chips    = JSON.parse(localStorage.getItem('dp5_chips')  ||'{}');
let subData  = JSON.parse(localStorage.getItem('dp5_subs')   ||'{}');
let locNames = JSON.parse(localStorage.getItem('dp5_names')  ||'{}');
let customs  = JSON.parse(localStorage.getItem('dp5_custom') ||'[]');
let openSet  = new Set(JSON.parse(localStorage.getItem('dp5_open') ||'[]'));
let filter   = 'all';
let addOpen  = false;
let editId   = null;

function save(){
  localStorage.setItem('dp5_chips',  JSON.stringify(chips));
  localStorage.setItem('dp5_subs',   JSON.stringify(subData));
  localStorage.setItem('dp5_names',  JSON.stringify(locNames));
  localStorage.setItem('dp5_custom', JSON.stringify(customs));
  localStorage.setItem('dp5_open',   JSON.stringify([...openSet]));
}

// ─── Resolvers ────────────────────────────────────────────────────────────────
function getSubs(id){ return subData[id]?subData[id]:(DEFAULT_SUBS[id]?JSON.parse(JSON.stringify(DEFAULT_SUBS[id])):[mkSub('main','Main')]); }
function getBase(id){ return BASE_TYPES[id]||MOST; }
function getName(loc){ return(locNames[loc.id]&&locNames[loc.id].name)||loc.name; }
function getIcon(loc){ return(locNames[loc.id]&&locNames[loc.id].icon)||loc.icon; }

function subTypes(id,sub){
  const base=getBase(id);
  return sub.ice?[...base,'ice']:base.filter(t=>t!=='ice');
}
function rareTypes(id,sub){
  const base=getBase(id);
  return sub.rareIce?[...base,'ice']:base.filter(t=>t!=='ice');
}

// ─── Chip access ──────────────────────────────────────────────────────────────
function ck(id,sk,type){ return `${id}__${sk}__${type}`; }
function getChip(id,sk,type){ return chips[ck(id,sk,type)]||'none'; }
function cycleChip(id,sk,type,ev){
  ev.stopPropagation();
  const k=ck(id,sk,type);
  chips[k]=STATES[(STATES.indexOf(chips[k]||'none')+1)%STATES.length];
  save();renderAll();
}

// ─── Progress counting ────────────────────────────────────────────────────────
// Denominator: 1 per tag slot, +1 for each tag slot where rare is toggled on
// Numerator:   complete = +1, rare complete = +2 (covers both normal + rare slot)
function progress(){
  let score=0, total=0;
  for(const loc of allLocs()){
    const subs=getSubs(loc.id);
    for(const sub of subs){
      const types=subTypes(loc.id,sub);
      const rTypes=sub.hasRare?rareTypes(loc.id,sub):[];
      for(const t of types){
        total+=1; // normal slot
        if(sub.hasRare&&rTypes.includes(t)) total+=1; // +1 rare slot for this type
        const s=getChip(loc.id,sub.key,t);
        if(s==='complete') score+=1;
        else if(s==='rare') score+=2; // fills both normal + rare slot
      }
      // if rareIce adds ice as an extra type not in normal types
      if(sub.hasRare&&sub.rareIce&&!sub.ice){
        total+=1; // rare-only ice slot
        if(getChip(loc.id,sub.key,'ice')==='rare') score+=1;
      }
    }
  }
  return{score,total};
}

// ─── Card counts (header badges) ──────────────────────────────────────────────
function cardCounts(loc){
  const subs=getSubs(loc.id);
  let nd=0,nt=0,rd=0,rt=0;
  for(const sub of subs){
    const types=subTypes(loc.id,sub);
    for(const t of types){
      nt++;
      const s=getChip(loc.id,sub.key,t);
      if(s!=='none'&&s!=='replace') nd++; // tracked = progress/complete/rare
      if(s==='complete'||s==='rare') nd; // already counted
    }
    if(sub.hasRare){
      for(const t of rareTypes(loc.id,sub)){
        rt++;
        if(getChip(loc.id,sub.key,t)==='rare') rd++;
      }
    }
  }
  // re-count nd properly: count anything not none
  nd=0;
  for(const sub of subs)
    for(const t of subTypes(loc.id,sub)){
      const s=getChip(loc.id,sub.key,t);
      if(s!=='none') nd++;
    }
  return{nd,nt,rd,rt};
}

function cardAllDone(loc){
  const subs=getSubs(loc.id);
  for(const sub of subs)
    for(const t of subTypes(loc.id,sub)){
      const s=getChip(loc.id,sub.key,t);
      if(s!=='complete'&&s!=='rare') return false;
    }
  return true;
}

// ─── All locations ────────────────────────────────────────────────────────────
function allLocs(){ return [...LOCS,...customs]; }

// ─── Search + sort + filter ───────────────────────────────────────────────────
function getSearch(){ return(document.getElementById('searchInput')||{}).value?.trim().toLowerCase()||''; }
function getSort(){   return(document.getElementById('sortSelect')||{}).value||'game'; }

function locMatchesSearch(loc){
  const q=getSearch();
  if(!q) return true;
  return getName(loc).toLowerCase().includes(q)||
    getSubs(loc.id).some(s=>s.label.toLowerCase().includes(q));
}

function cardMatchesFilter(loc){
  if(!locMatchesSearch(loc)) return false;
  if(filter==='all') return true;
  const subs=getSubs(loc.id);
  const ss=[];
  for(const sub of subs)
    for(const t of subTypes(loc.id,sub)) ss.push(getChip(loc.id,sub.key,t));
  if(filter==='missing')  return ss.some(s=>s==='none');
  if(filter==='progress') return ss.some(s=>s==='progress');
  if(filter==='complete') return ss.every(s=>s==='complete'||s==='rare');
  if(filter==='replace')  return ss.some(s=>s==='replace');
  return true;
}

function sortedLocs(locs){
  const sort=getSort();
  if(sort==='alpha') return [...locs].sort((a,b)=>getName(a).localeCompare(getName(b)));
  if(sort==='created') return [...locs].sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  return locs; // game order = as defined
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function renderTags(id,sk,types){
  let h='<div class="tag-row">';
  for(const t of types){
    const s=getChip(id,sk,t);
    const ic=SICON[s];
    h+=`<div class="pik-tag ${t}" data-state="${s}" onclick="cycleChip('${id}','${sk}','${t}',event)">`;
    h+=`<span class="dot"></span>${PIK[t]}${ic?`<span class="sicon">${ic}</span>`:''}`;
    h+='</div>';
  }
  return h+'</div>';
}

function renderCard(loc){
  const subs=getSubs(loc.id);
  const{nd,nt,rd,rt}=cardCounts(loc);
  const isOpen=openSet.has(loc.id);
  const done=cardAllDone(loc);
  const subLabels=subs.map(s=>s.label).join(' · ');

  let h=`<div class="card${done?' all-done':''}${isOpen?' open':''}" id="card_${loc.id}">`;
  h+=`<div class="card-hdr" onclick="toggleCard('${loc.id}')">`;
  h+=`<div class="card-left"><span class="loc-icon">${getIcon(loc)}</span>`;
  h+=`<div><div class="card-name">${getName(loc)}</div><div class="card-sub">${subLabels}</div></div></div>`;
  h+=`<div class="card-right">`;
  h+=`<span class="badge${nd===nt?' full':''}">${nd}/${nt}</span>`;
  if(rt>0) h+=`<span class="badge rare">⭐${rd}/${rt}</span>`;
  h+=`<button class="ibtn" onclick="openEdit('${loc.id}',event)">✏️</button>`;
  if(loc.custom) h+=`<button class="ibtn del" onclick="delCustom('${loc.id}',event)">✕</button>`;
  h+=`<span class="chevron">▼</span></div></div>`;

  h+=`<div class="card-body">`;
  for(const sub of subs){
    const types=subTypes(loc.id,sub);
    h+=`<div class="sub-row">`;
    if(subs.length>1) h+=`<div class="sub-hdr"><span class="sub-name">${sub.label}${sub.hasRare?' ⭐':''}</span></div>`;
    h+=renderTags(loc.id,sub.key,types);
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

// ─── Edit modal ───────────────────────────────────────────────────────────────
function toggleCard(id){ openSet.has(id)?openSet.delete(id):openSet.add(id); save(); renderAll(); }
function openEdit(id,ev){ ev.stopPropagation(); editId=id; renderAll(); }
function closeEdit(){ editId=null; document.getElementById('mroot').innerHTML=''; }

function renderModal(){
  const loc=allLocs().find(l=>l.id===editId);
  if(!loc){ closeEdit(); return; }
  const subs=getSubs(loc.id);
  const nm=locNames[loc.id]||{};

  let subRows='';
  subs.forEach((sub,i)=>{
    subRows+=`<div class="sub-edit-row" id="subrow_${i}">
      <input type="text" id="sub_label_${i}" value="${sub.label}" placeholder="Sub-collection name">
      <span class="sep">·</span>
      <label class="tsw" title="Ice Pikmin"><input type="checkbox" id="sub_ice_${i}" ${sub.ice?'checked':''}><span class="ttrack"></span></label>
      <span class="mini-label">🩵</span>
      <label class="tsw gold" title="Has Rare"><input type="checkbox" id="sub_rare_${i}" ${sub.hasRare?'checked':''} onchange="toggleRareIceVis(${i})"><span class="ttrack"></span></label>
      <span class="mini-label">⭐</span>
      <label class="tsw" id="sub_rareice_sw_${i}" title="Ice in Rare" style="opacity:${sub.hasRare?1:.35}">
        <input type="checkbox" id="sub_rareice_${i}" ${sub.rareIce?'checked':''} ${sub.hasRare?'':'disabled'}><span class="ttrack"></span>
      </label>
      <span class="mini-label" style="opacity:${sub.hasRare?1:.35}">🩵⭐</span>
      <button class="ibtn del" onclick="removeSubRow(${i})" title="Remove">✕</button>
    </div>`;
  });

  document.getElementById('mroot').innerHTML=`
  <div class="modal-bg" onclick="closeEdit()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>✏️ ${getName(loc)}</h2>
    <div class="modal-section">Card Info</div>
    <div class="mrow"><input type="text" id="editName" value="${nm.name||''}" placeholder="${loc.name} (override name)"></div>
    <div class="modal-section">Sub-collections
      <span style="font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-dim);margin-left:6px;">
        🩵 Ice &nbsp;⭐ Has Rare &nbsp;🩵⭐ Ice in Rare
      </span>
    </div>
    <div id="subEditorList">${subRows}</div>
    <button class="add-sub-btn" onclick="addSubRow()">＋ Add sub-collection</button>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div></div>`;
}

function toggleRareIceVis(i){
  const checked=document.getElementById(`sub_rare_${i}`).checked;
  const sw=document.getElementById(`sub_rareice_sw_${i}`);
  const ic=document.getElementById(`sub_rareice_${i}`);
  sw.style.opacity=checked?1:.35;
  ic.disabled=!checked;
  if(!checked) ic.checked=false;
}

function removeSubRow(i){ document.getElementById(`subrow_${i}`)?.remove(); }

function addSubRow(){
  const list=document.getElementById('subEditorList');
  const i=list.children.length;
  const div=document.createElement('div');
  div.className='sub-edit-row'; div.id=`subrow_${i}`;
  div.innerHTML=`
    <input type="text" id="sub_label_${i}" value="" placeholder="New sub-collection">
    <span class="sep">·</span>
    <label class="tsw"><input type="checkbox" id="sub_ice_${i}"><span class="ttrack"></span></label>
    <span class="mini-label">🩵</span>
    <label class="tsw gold"><input type="checkbox" id="sub_rare_${i}" onchange="toggleRareIceVis(${i})"><span class="ttrack"></span></label>
    <span class="mini-label">⭐</span>
    <label class="tsw" id="sub_rareice_sw_${i}" style="opacity:.35">
      <input type="checkbox" id="sub_rareice_${i}" disabled><span class="ttrack"></span>
    </label>
    <span class="mini-label" style="opacity:.35">🩵⭐</span>
    <button class="ibtn del" onclick="removeSubRow(${i})">✕</button>`;
  list.appendChild(div);
}

function saveEdit(){
  const loc=allLocs().find(l=>l.id===editId);
  if(!loc) return;
  const nameVal=document.getElementById('editName').value.trim();
  locNames[loc.id]={name:nameVal||undefined};
  const list=document.getElementById('subEditorList');
  const newSubs=[];
  for(const row of list.children){
    const idx=row.id.replace('subrow_','');
    const label=(document.getElementById(`sub_label_${idx}`)||{}).value?.trim();
    if(!label) continue;
    const existing=getSubs(loc.id).find(s=>s.label===label);
    const key=existing?existing.key:label.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20)+'_'+Date.now()%10000;
    newSubs.push({key,label,
      ice:     !!(document.getElementById(`sub_ice_${idx}`)?.checked),
      hasRare: !!(document.getElementById(`sub_rare_${idx}`)?.checked),
      rareIce: !!(document.getElementById(`sub_rareice_${idx}`)?.checked),
    });
  }
  if(newSubs.length) subData[loc.id]=newSubs;
  closeEdit(); save(); renderAll();
}

// ─── Add custom collection ────────────────────────────────────────────────────
function toggleAdd(){ addOpen=!addOpen; renderAll(); }

function addCustom(){
  const name=(document.getElementById('newName')||{}).value?.trim();
  const sub=(document.getElementById('newSub')||{}).value?.trim()||'Main';
  const section=document.querySelector('input[name="newSection"]:checked')?.value||'monthly';
  if(!name){ document.getElementById('newName')?.focus(); return; }
  const id='cust_'+Date.now();
  const createdAt=Date.now();
  customs.push({id,icon:'📅',name,section,custom:true,createdAt});
  subData[id]=[mkSub('main',sub)];
  BASE_TYPES[id]=MOST;
  openSet.add(id);
  addOpen=false;
  save();renderAll();
}

function delCustom(id,ev){
  ev.stopPropagation();
  if(!confirm('Remove this category?')) return;
  customs=customs.filter(c=>c.id!==id);
  openSet.delete(id);
  delete subData[id]; delete locNames[id];
  Object.keys(chips).forEach(k=>{if(k.startsWith(id+'__'))delete chips[k];});
  save();renderAll();
}

// ─── Filter / sort helpers ────────────────────────────────────────────────────
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function resetAll(){ if(confirm('Reset all tag progress?')){ chips={}; save(); renderAll(); } }

// ─── Section rendering ────────────────────────────────────────────────────────
function renderSection(label, locs){
  const visible=sortedLocs(locs).filter(cardMatchesFilter);
  if(!visible.length) return '';
  let h=`<div class="sec-label">${label}</div>`;
  for(const loc of visible) h+=renderCard(loc);
  return h;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function renderAll(){
  // Progress bar
  const{score,total}=progress();
  const pct=total?Math.round(score/total*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=`${score} / ${total} collected`;
  document.getElementById('pPct').textContent=pct+'%';

  // Sections
  const locationLocs = LOCS.filter(l=>l.section==='location');
  const roadside     = LOCS.find(l=>l.id==='roadside');
  const otherSpecial = LOCS.filter(l=>l.section==='special'&&l.id!=='roadside');

  // Customs by section
  const custLocation = customs.filter(c=>c.section==='location');
  const custSpecial  = customs.filter(c=>c.section==='special');
  const custMonthly  = customs.filter(c=>c.section==='monthly'||!c.section);

  // Build location section, injecting roadside after library
  const sort=getSort();
  let locHtml='';
  const allLocationLocs=[...locationLocs,...custLocation];
  const sortedLocation=sortedLocs(allLocationLocs).filter(cardMatchesFilter);

  if(sort==='game'){
    // inject roadside after library in game order
    let locBody='';
    let roadsideRendered=false;
    for(const loc of locationLocs.filter(cardMatchesFilter)){
      locBody+=renderCard(loc);
      if(loc.id==='library'&&roadside&&cardMatchesFilter(roadside)){
        locBody+=renderCard(roadside);
        roadsideRendered=true;
      }
    }
    for(const loc of custLocation.filter(cardMatchesFilter)) locBody+=renderCard(loc);
    if(locBody) locHtml=`<div class="sec-label">Location Decor</div>`+locBody;

    let specBody='';
    if(roadside&&cardMatchesFilter(roadside)&&!roadsideRendered) specBody+=renderCard(roadside);
    for(const loc of otherSpecial.filter(cardMatchesFilter)) specBody+=renderCard(loc);
    for(const loc of custSpecial.filter(cardMatchesFilter)) specBody+=renderCard(loc);
    if(specBody) locHtml+=`<div class="sec-label">Special Decor</div>`+specBody;
  } else {
    // alpha or date: just sort all location+roadside together under Location Decor, special separate
    const allLoc=[...locationLocs,...(roadside?[roadside]:[]),...custLocation];
    const visLoc=sortedLocs(allLoc).filter(cardMatchesFilter);
    if(visLoc.length) locHtml=`<div class="sec-label">Location Decor</div>`+visLoc.map(renderCard).join('');
    const allSpec=[...otherSpecial,...custSpecial];
    const visSpec=sortedLocs(allSpec).filter(cardMatchesFilter);
    if(visSpec.length) locHtml+=`<div class="sec-label">Special Decor</div>`+visSpec.map(renderCard).join('');
  }

  // Monthly
  const visMonthly=sortedLocs(custMonthly).filter(cardMatchesFilter);
  let monthHtml=`<div class="sec-label">Monthly Collections</div>`;
  for(const loc of visMonthly) monthHtml+=renderCard(loc);
  monthHtml+=`<div class="add-section">
    <div class="add-toggle" onclick="toggleAdd()"><span style="font-size:18px;color:var(--green)">＋</span> Add Collection</div>
    <div class="add-form${addOpen?' open':''}">
      <label class="field-label">Collection name</label>
      <input type="text" id="newName" placeholder="e.g. Valentine's Day 2026">
      <label class="field-label">First sub-collection</label>
      <input type="text" id="newSub" placeholder="e.g. Heart Bouquet">
      <label class="field-label">Section</label>
      <div class="seg-pick">
        <label><input type="radio" name="newSection" value="location"><span>Location</span></label>
        <label><input type="radio" name="newSection" value="special"><span>Special</span></label>
        <label><input type="radio" name="newSection" value="monthly" checked><span>Monthly</span></label>
      </div>
      <p style="font-size:11px;color:var(--text-dim);margin-top:10px;">Use ✏️ after adding to configure Ice &amp; Rare per sub-collection.</p>
      <button class="add-submit" onclick="addCustom()">Add</button>
    </div>
  </div>`;

  document.getElementById('app').innerHTML=locHtml+monthHtml;
  if(editId) renderModal();
}

renderAll();
</script>
